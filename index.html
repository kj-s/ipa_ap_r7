<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>応用情報 午前 過去問</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <header class="topbar">
        <div>
          <p class="eyebrow">令和7年度 秋期</p>
          <h1>応用情報技術者試験 午前</h1>
        </div>
        <div class="progress" aria-label="進捗">
          <span id="progressText">問1 / 80</span>
          <div class="progress-track"><div id="progressBar"></div></div>
        </div>
      </header>

      <section class="question-pane" aria-live="polite">
        <div class="question-head">
          <div>
            <span id="questionNumber" class="question-number">問1</span>
            <span id="categoryBadge" class="badge">テクノロジ</span>
          </div>
          <button id="toggleAnswer" class="ghost-button" type="button">解答を表示</button>
        </div>
        <div id="imageStack" class="image-stack"></div>
      </section>

      <section class="answer-panel">
        <div class="choices" role="group" aria-label="選択肢">
          <button class="choice" type="button" data-choice="ア">ア</button>
          <button class="choice" type="button" data-choice="イ">イ</button>
          <button class="choice" type="button" data-choice="ウ">ウ</button>
          <button class="choice" type="button" data-choice="エ">エ</button>
        </div>
        <div id="result" class="result" aria-live="polite"></div>
      </section>

      <nav class="nav">
        <button id="prevButton" class="nav-button" type="button">前へ</button>
        <select id="jumpSelect" aria-label="問題へ移動"></select>
        <button id="nextButton" class="nav-button primary" type="button">次へ</button>
      </nav>
    </main>

    <script src="questions.js"></script>
    <script src="app.js"></script>
  </body>
</html>
